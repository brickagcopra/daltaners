services:
  # ──────────────────────────────────────────────
  # PostgreSQL 17 with PostGIS
  # ──────────────────────────────────────────────
  postgres:
    image: postgis/postgis:17-3.5
    container_name: daltaners-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: daltaners
      POSTGRES_PASSWORD: daltaners_dev_password
      POSTGRES_DB: daltaners
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U daltaners -d daltaners']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - daltaners-network

  # ──────────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: daltaners-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - daltaners-network

  # ──────────────────────────────────────────────
  # Zookeeper (required by Kafka)
  # ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: daltaners-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ['CMD-SHELL', 'echo srvr | nc localhost 2181 | grep Mode']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - daltaners-network

  # ──────────────────────────────────────────────
  # Apache Kafka (single broker)
  # ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: daltaners-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - '9092:9092'
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./docker/init-kafka-topics.sh:/docker-entrypoint-initdb.d/init-kafka-topics.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'kafka-broker-api-versions --bootstrap-server localhost:9092']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - daltaners-network

  # ──────────────────────────────────────────────
  # Kafka Topic Initialization (one-shot)
  # ──────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: daltaners-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./docker/init-kafka-topics.sh:/init-kafka-topics.sh:ro
    entrypoint: ['/bin/bash', '/init-kafka-topics.sh']
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
    networks:
      - daltaners-network
    restart: 'no'

  # ──────────────────────────────────────────────
  # Elasticsearch 8
  # ──────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: daltaners-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=daltaners-es-cluster
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q ''"status":"green"\|"status":"yellow"''']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - daltaners-network

  # ──────────────────────────────────────────────
  # Apache Cassandra 4.1
  # ──────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: daltaners-cassandra
    restart: unless-stopped
    environment:
      - CASSANDRA_CLUSTER_NAME=daltaners-cluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    ports:
      - '9042:9042'
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./docker/init-cassandra.cql:/docker-entrypoint-initdb.d/init-cassandra.cql:ro
    healthcheck:
      test: ['CMD-SHELL', 'cqlsh -e "DESCRIBE KEYSPACES;" || exit 1']
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
    networks:
      - daltaners-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_log:
    driver: local
  kafka_data:
    driver: local
  elasticsearch_data:
    driver: local
  cassandra_data:
    driver: local

networks:
  daltaners-network:
    driver: bridge
    name: daltaners-network
