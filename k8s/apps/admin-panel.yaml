apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-panel
  namespace: daltaners
  labels:
    app: admin-panel
    app.kubernetes.io/part-of: daltaners
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-panel
  template:
    metadata:
      labels:
        app: admin-panel
        app.kubernetes.io/part-of: daltaners
    spec:
      serviceAccountName: daltaners-service-account
      containers:
        - name: admin-panel
          image: daltaners/admin-panel:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: admin-panel
  namespace: daltaners
  labels:
    app: admin-panel
spec:
  selector:
    app: admin-panel
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
