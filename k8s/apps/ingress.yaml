apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: daltaners-ingress
  namespace: daltaners
  labels:
    app.kubernetes.io/part-of: daltaners
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    nginx.ingress.kubernetes.io/gzip-types: "application/json application/javascript text/css text/html"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - daltaners.ph
        - admin.daltaners.ph
        - vendor.daltaners.ph
        - api.daltaners.ph
      secretName: daltaners-tls
  rules:
    # Customer Web App
    - host: daltaners.ph
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-web
                port:
                  number: 80

    # Admin Panel
    - host: admin.daltaners.ph
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80

    # Vendor Dashboard
    - host: vendor.daltaners.ph
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vendor-dashboard
                port:
                  number: 80

    # API Gateway — routes to backend microservices
    - host: api.daltaners.ph
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
          - path: /api/v1/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3002
          - path: /api/v1/vendors
            pathType: Prefix
            backend:
              service:
                name: vendor-service
                port:
                  number: 3003
          - path: /api/v1/catalog
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  number: 3004
          - path: /api/v1/inventory
            pathType: Prefix
            backend:
              service:
                name: inventory-service
                port:
                  number: 3005
          - path: /api/v1/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 3006
          - path: /api/v1/delivery
            pathType: Prefix
            backend:
              service:
                name: delivery-service
                port:
                  number: 3007
          - path: /api/v1/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 3008
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3010
          - path: /api/v1/chat
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 3013
          - path: /api/v1/zones
            pathType: Prefix
            backend:
              service:
                name: zone-service
                port:
                  number: 3014
          - path: /api/v1/loyalty
            pathType: Prefix
            backend:
              service:
                name: loyalty-service
                port:
                  number: 3017
---
# WebSocket Ingress for real-time services (Socket.IO)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: daltaners-websocket-ingress
  namespace: daltaners
  labels:
    app.kubernetes.io/part-of: daltaners
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "notification-service,delivery-service,chat-service"
    nginx.ingress.kubernetes.io/connection-proxy-header: "keep-alive"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  tls:
    - hosts:
        - ws.daltaners.ph
      secretName: daltaners-ws-tls
  rules:
    - host: ws.daltaners.ph
      http:
        paths:
          - path: /notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3010
          - path: /delivery
            pathType: Prefix
            backend:
              service:
                name: delivery-service
                port:
                  number: 3007
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 3013
