apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-web
  namespace: daltaners
  labels:
    app: customer-web
    app.kubernetes.io/part-of: daltaners
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-web
  template:
    metadata:
      labels:
        app: customer-web
        app.kubernetes.io/part-of: daltaners
    spec:
      serviceAccountName: daltaners-service-account
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: customer-web
      containers:
        - name: customer-web
          image: daltaners/customer-web:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: customer-web
  namespace: daltaners
  labels:
    app: customer-web
spec:
  selector:
    app: customer-web
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
