apiVersion: v1
kind: ConfigMap
metadata:
  name: daltaners-config
  namespace: daltaners
  labels:
    app.kubernetes.io/part-of: daltaners
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"

  # PostgreSQL
  DB_HOST: "postgres.daltaners.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "daltaners"

  # Redis
  REDIS_HOST: "redis.daltaners.svc.cluster.local"
  REDIS_PORT: "6379"

  # Kafka
  KAFKA_BROKERS: "kafka-0.kafka-headless.daltaners.svc.cluster.local:9092"

  # Cassandra
  CASSANDRA_CONTACT_POINTS: "cassandra-0.cassandra-headless.daltaners.svc.cluster.local"
  CASSANDRA_DATACENTER: "datacenter1"
  CASSANDRA_KEYSPACE: "daltaners"

  # Elasticsearch
  ELASTICSEARCH_NODE: "http://elasticsearch.daltaners.svc.cluster.local:9200"
  ELASTICSEARCH_ENABLED: "true"

  # Service discovery (internal DNS)
  AUTH_SERVICE_URL: "http://auth-service.daltaners.svc.cluster.local:3001"
  USER_SERVICE_URL: "http://user-service.daltaners.svc.cluster.local:3002"
  VENDOR_SERVICE_URL: "http://vendor-service.daltaners.svc.cluster.local:3003"
  CATALOG_SERVICE_URL: "http://catalog-service.daltaners.svc.cluster.local:3004"
  INVENTORY_SERVICE_URL: "http://inventory-service.daltaners.svc.cluster.local:3005"
  ORDER_SERVICE_URL: "http://order-service.daltaners.svc.cluster.local:3006"
  DELIVERY_SERVICE_URL: "http://delivery-service.daltaners.svc.cluster.local:3007"
  PAYMENT_SERVICE_URL: "http://payment-service.daltaners.svc.cluster.local:3008"
  NOTIFICATION_SERVICE_URL: "http://notification-service.daltaners.svc.cluster.local:3010"
  CHAT_SERVICE_URL: "http://chat-service.daltaners.svc.cluster.local:3013"
  ZONE_SERVICE_URL: "http://zone-service.daltaners.svc.cluster.local:3014"
  LOYALTY_SERVICE_URL: "http://loyalty-service.daltaners.svc.cluster.local:3017"

  # CORS (production domains)
  CORS_ORIGINS: "https://daltaners.ph,https://admin.daltaners.ph,https://vendor.daltaners.ph"
