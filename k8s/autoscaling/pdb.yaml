# PodDisruptionBudgets — ensure minimum availability during voluntary disruptions
# (rolling updates, node drains, cluster maintenance)

---
# Critical path services: order, delivery, payment — minimum 2 pods always available
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: order-service-pdb
  namespace: daltaners
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: order-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: delivery-service-pdb
  namespace: daltaners
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: delivery-service
---
apiVersion: policy/v1
