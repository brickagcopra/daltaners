apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: daltaners
  labels:
    app: notification-service
    app.kubernetes.io/part-of: daltaners
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        app.kubernetes.io/part-of: daltaners
    spec:
      serviceAccountName: daltaners-service-account
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: notification-service
      containers:
        - name: notification-service
          image: daltaners/notification-service:latest
          ports:
            - containerPort: 3010
              protocol: TCP
          envFrom:
            - configMapRef:
                name: daltaners-config
            - secretRef:
                name: daltaners-secrets
          env:
            - name: PORT
              value: "3010"
            - name: DB_SCHEMA
              value: "notifications"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: daltaners
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 3010
      targetPort: 3010
      protocol: TCP
  type: ClusterIP
