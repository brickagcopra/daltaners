apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: daltaners
  labels:
    app: payment-service
    app.kubernetes.io/part-of: daltaners
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/part-of: daltaners
    spec:
      serviceAccountName: daltaners-service-account
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: payment-service
      containers:
        - name: payment-service
          image: daltaners/payment-service:latest
          ports:
            - containerPort: 3008
              protocol: TCP
          envFrom:
            - configMapRef:
                name: daltaners-config
            - secretRef:
                name: daltaners-secrets
          env:
            - name: PORT
              value: "3008"
            - name: DB_SCHEMA
              value: "payments"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3008
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3008
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: daltaners
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - port: 3008
      targetPort: 3008
      protocol: TCP
  type: ClusterIP
