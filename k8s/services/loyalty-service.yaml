apiVersion: apps/v1
kind: Deployment
metadata:
  name: loyalty-service
  namespace: daltaners
  labels:
    app: loyalty-service
    app.kubernetes.io/part-of: daltaners
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loyalty-service
  template:
    metadata:
      labels:
        app: loyalty-service
        app.kubernetes.io/part-of: daltaners
    spec:
      serviceAccountName: daltaners-service-account
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: loyalty-service
      containers:
        - name: loyalty-service
          image: daltaners/loyalty-service:latest
          ports:
            - containerPort: 3017
              protocol: TCP
          envFrom:
            - configMapRef:
                name: daltaners-config
            - secretRef:
                name: daltaners-secrets
          env:
            - name: PORT
              value: "3017"
            - name: DB_SCHEMA
              value: "loyalty"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 3017
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3017
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3017
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: loyalty-service
  namespace: daltaners
  labels:
    app: loyalty-service
spec:
  selector:
    app: loyalty-service
  ports:
    - port: 3017
      targetPort: 3017
      protocol: TCP
  type: ClusterIP
