apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: daltaners
data:
  KAFKA_ZOOKEEPER_CONNECT: "zookeeper-headless.daltaners.svc.cluster.local:2181"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
  KAFKA_NUM_PARTITIONS: "3"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
  KAFKA_LOG_RETENTION_HOURS: "168"
  KAFKA_LOG_RETENTION_BYTES: "1073741824"
  KAFKA_MESSAGE_MAX_BYTES: "10485760"
---
# Zookeeper StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
  namespace: daltaners
  labels:
    app: zookeeper
    app.kubernetes.io/part-of: daltaners
    app.kubernetes.io/component: messaging
spec:
  serviceName: zookeeper-headless
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
        app.kubernetes.io/part-of: daltaners
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.0
          ports:
            - containerPort: 2181
              protocol: TCP
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper/data
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "echo srvr | nc localhost 2181 | grep Mode"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - "echo srvr | nc localhost 2181 | grep Mode"
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: zookeeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper-headless
  namespace: daltaners
  labels:
    app: zookeeper
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
  clusterIP: None
---
# Kafka StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: daltaners
  labels:
    app: kafka
    app.kubernetes.io/part-of: daltaners
    app.kubernetes.io/component: messaging
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        app.kubernetes.io/part-of: daltaners
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kafka-config
          env:
            - name: KAFKA_BROKER_ID
              value: "0"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-0.kafka-headless.daltaners.svc.cluster.local:9092"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "kafka-broker-api-versions --bootstrap-server localhost:9092"
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - "kafka-broker-api-versions --bootstrap-server localhost:9092"
            initialDelaySeconds: 60
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: daltaners
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
  clusterIP: None
---
# Kafka topic initialization Job
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init-topics
  namespace: daltaners
  labels:
    app.kubernetes.io/part-of: daltaners
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: confluentinc/cp-kafka:7.6.0
          command:
            - bash
            - -c
            - |
              echo "Waiting for Kafka..."
              cub kafka-ready -b kafka-0.kafka-headless.daltaners.svc.cluster.local:9092 1 120

              BROKER="kafka-0.kafka-headless.daltaners.svc.cluster.local:9092"

              declare -A TOPICS=(
                ["daltaners.orders.events"]=6
                ["daltaners.orders.status"]=3
                ["daltaners.payments.events"]=6
                ["daltaners.inventory.events"]=3
                ["daltaners.delivery.events"]=3
                ["daltaners.delivery.location"]=6
                ["daltaners.delivery.assignments"]=3
                ["daltaners.notifications.outbound"]=3
                ["daltaners.users.events"]=3
                ["daltaners.catalog.events"]=3
                ["daltaners.chat.events"]=3
                ["daltaners.loyalty.events"]=3
              )

              for TOPIC in "${!TOPICS[@]}"; do
                PARTITIONS=${TOPICS[$TOPIC]}
                kafka-topics --create --if-not-exists \
                  --bootstrap-server "$BROKER" \
                  --topic "$TOPIC" \
                  --partitions "$PARTITIONS" \
                  --replication-factor 1
                echo "Created topic: $TOPIC ($PARTITIONS partitions)"
              done

              echo "All topics created."
