apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: daltaners
  labels:
    app: cassandra
    app.kubernetes.io/part-of: daltaners
    app.kubernetes.io/component: database
spec:
  serviceName: cassandra-headless
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
        app.kubernetes.io/part-of: daltaners
    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1
          ports:
            - containerPort: 9042
              protocol: TCP
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "daltaners-cluster"
            - name: CASSANDRA_DC
              value: "datacenter1"
            - name: CASSANDRA_RACK
              value: "rack1"
            - name: CASSANDRA_SEEDS
              value: "cassandra-0.cassandra-headless.daltaners.svc.cluster.local"
            - name: MAX_HEAP_SIZE
              value: "512M"
            - name: HEAP_NEWSIZE
              value: "100M"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: cassandra-data
              mountPath: /var/lib/cassandra
          readinessProbe:
            exec:
              command:
                - cqlsh
                - -e
                - "SELECT now() FROM system.local"
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - nodetool
                - status
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: cassandra-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra-headless
  namespace: daltaners
  labels:
    app: cassandra
spec:
  selector:
    app: cassandra
  ports:
    - port: 9042
      targetPort: 9042
  clusterIP: None
