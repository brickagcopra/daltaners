apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: daltaners
data:
  POSTGRES_DB: "daltaners"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  # PostgreSQL tuning for production
  POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: daltaners
data:
  init.sql: |
    -- This will be populated from docker/init-postgres.sql
    -- Mount the actual init script via ConfigMap from file
    SELECT 1;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: daltaners
  labels:
    app: postgres
    app.kubernetes.io/part-of: daltaners
    app.kubernetes.io/component: database
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/part-of: daltaners
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          envFrom:
            - configMapRef:
                name: postgres-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: daltaners-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: daltaners-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - daltaners
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - daltaners
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: daltaners
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: daltaners
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
